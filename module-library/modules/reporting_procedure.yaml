id: reporting_procedure
title: Reporting procedure reminder
description: Shared reporting-procedure content step used in conduct and compliance modules.
version: 1.0.0
category: compliance
tags:
  - compliance
  - reporting
  - procedure
lastUpdated: 2026-03-12
deprecated: false
templateData:
  reportingLabel: approved reporting channel
variableSchema:
  variables:
    companyName:
      type: text
      label: Company name
      description: Organization name referenced in the reporting-procedure reminder.
    reportingChannel:
      type: text
      label: Reporting channel
      description: Explicit reporting route surfaced in the callout copy.
    reportingLabel:
      type: text
      label: Reporting label
      description: Short label used for the approved reporting route.
      required: false
      default: approved reporting channel
tests:
  - id: reporting-callout-keeps-channel-visible
    name: Reporting channel remains visible
    description: Confirms the shared reporting procedure keeps the approved route explicit.
    tags:
      - compliance
      - reporting
nodes:
  - id: reporting-procedure
    type: content
    layout: callout
    title: Reporting procedure
    body:
      - "Record the facts, preserve relevant evidence, and route the concern through {{reportingLabel}}."
      - "Structured reporting keeps the next step clear for {{companyName}}."
    callout:
      title: Approved channel
      text: Route the concern through {{reportingChannel}} instead of informal side conversations.
    next: follow-through
