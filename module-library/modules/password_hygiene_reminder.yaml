id: password_hygiene_reminder
title: Password hygiene reminder
description: Shared reminder node reinforcing secure credential handling.
version: 1.0.0
category: security-awareness
tags:
  - security
  - password
  - reminder
lastUpdated: 2026-03-12
deprecated: false
variableSchema:
  variables:
    reportingChannel:
      type: text
      label: Reporting channel
      description: Approved reporting channel referenced in the password reminder.
tests:
  - id: reminder-routes-to-report
    name: Password reminder routes into the report step
    description: Confirms the reminder continues into the reporting choice node.
    tags:
      - security
      - password
nodes:
  - id: password-hygiene-reminder
    type: content
    layout: callout
    title: Reinforce the reporting habit
    body:
      - "Never verify suspicious requests by reusing a password or replying to the message."
      - "Use {{reportingChannel}} and the documented reporting flow instead."
    callout:
      title: Password hygiene
      text: Treat urgent credential requests as a reporting event, not a help-desk shortcut.
    next: report
