id: phishing_intro
title: Shared phishing introduction
description: Standard introduction node for phishing scenario families.
version: 1.0.0
category: security-awareness
tags:
  - security
  - phishing
  - intro
lastUpdated: 2026-03-12
deprecated: false
templateData:
  introImageSrc: https://placehold.co/720x420/png?text=Phishing+Inbox
  introImageAlt: Suspicious inbox example
variableSchema:
  variables:
    courseTitle:
      type: text
      label: Course title
      description: Runtime title shown at the opening of the phishing scenario.
    companyName:
      type: text
      label: Company name
      description: Organization name referenced in the shared phishing intro.
    introImageSrc:
      type: url
      label: Intro image URL
      description: Optional image shown beside the opening phishing scenario copy.
      required: false
      default: https://placehold.co/720x420/png?text=Phishing+Inbox
    introImageAlt:
      type: text
      label: Intro image alt text
      description: Alt text for the phishing inbox image.
      required: false
      default: Suspicious inbox example
tests:
  - id: intro-routes-to-inspect-email
    name: Intro continues into inspect-email
    description: Confirms the shared phishing intro routes into the first inspection step.
    tags:
      - navigation
      - phishing
nodes:
  - id: intro
    type: content
    layout: image-right
    title: "{{courseTitle}}"
    body:
      - "A suspicious message appears to come from leadership at {{companyName}}."
      - "Use the structured flow to inspect, question, and report it."
    media:
      type: image
      src: "{{introImageSrc}}"
      alt: "{{introImageAlt}}"
    next: inspect-email
