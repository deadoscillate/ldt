id: customer-service-escalation
title: Customer service escalation logic tests
description: Deterministic tests for the stateful escalation scenario.
target:
  templateId: customer-service-escalation
  variantId: retail-support
  themeId: default
tests:
  - id: structured-escalation-passes
    name: Structured escalation path passes
    description: An empathetic opening, strong escalation statement, and clear handoff should pass.
    tags:
      - starter
      - pass
      - stateful
    actions:
      - step: intro
        advance: true
      - step: first-response
        interact: empathy-reply
      - step: escalation-question
        select: best
      - step: follow-up
        advance: true
      - step: wrap-up
        select: complete
    expect:
      terminalStep: passed
      score: 10
      completionStatus: completed
      successStatus: passed
      pathLength: 6
      variables:
        companyName: Alpine Retail
      state:
        escalatedCustomer: false
        verifiedOrder: true
        customerMood: reassured
        empathyScore: 2
  - id: policy-first-path-needs-recovery
    name: Policy-first path fails without recovery
    description: A rigid opening should escalate the customer and end in failure if the recovery step is mishandled.
    tags:
      - starter
      - fail
      - stateful
    actions:
      - step: intro
        advance: true
      - step: first-response
        interact: policy-reply
      - step: escalation-question
        select: weak
      - step: follow-up
        advance: true
      - step: recovery
        interact: dismiss-reply
    expect:
      terminalStep: failed
      score: 0
      completionStatus: completed
      successStatus: failed
      pathLength: 6
      state:
        escalatedCustomer: true
        verifiedOrder: false
        customerMood: escalated
        empathyScore: -2
