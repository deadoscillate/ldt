variables:
  courseTitle:
    type: text
    label: Course title
    description: Display title shown in the runtime header and result screen.
  courseDescription:
    type: text
    label: Course description
    description: Summary used in studio cards and the preview header.
  companyName:
    type: text
    label: Company name
    description: Organization name referenced in the escalation scenario.
  escalationDesk:
    type: text
    label: Escalation desk
    description: Team or queue responsible for handling the escalation.
  escalationEmail:
    type: email
    label: Escalation email
    description: Email address learners should use when they escalate the issue.
