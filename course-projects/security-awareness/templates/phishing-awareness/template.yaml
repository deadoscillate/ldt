id: phishing-awareness
title: "{{courseTitle}}"
description: "{{courseDescription}}"
start: intro
passingScore: 10
templateData:
  courseTitle: Phishing Awareness Essentials
  courseDescription: Help learners recognize phishing signals and follow the approved reporting path.
  companyName: Northwind Health
  reportingChannel: security@northwindhealth.example
  policyUrl: https://example.com/security/phishing
state:
  reportedPhishing:
    type: boolean
    initial: false
    description: Tracks whether the learner used the approved reporting channel.
  openedAttachment:
    type: boolean
    initial: false
    description: Tracks whether the learner opened the suspicious attachment.
  investigationStatus:
    type: enum
    initial: inbox
    description: Tracks the current stage of the phishing investigation.
    options:
      - inbox
      - reviewing
      - reported
      - compromised
  riskScore:
    type: number
    initial: 0
    description: Tracks accumulated phishing risk from unsafe actions.
blocks:
  result_block:
    - id: passed
      type: result
      layout: result
      title: Scenario complete
      outcome: passed
      body:
        - "You used the approved phishing response for {{companyName}}."
        - "Final score: {{score}} / {{maxScore}}"
    - id: failed
      type: result
      layout: result
      title: Review needed
      outcome: failed
      body:
        - "Review the reporting path in {{policyUrl}} and try again."
        - "Final score: {{score}} / {{maxScore}}"
nodes:
  - include:
      module: phishing_intro
      version: 1.0.0
  - id: inspect-email
    type: branch
    layout: text
    shell: email_shell
    title: First move
    email:
      from: IT Support
      subject: "Urgent password reset required"
      previewText: "Your {{companyName}} access will expire today unless you confirm."
      warningBanner: "The workstation is now at risk. Follow the compromised-device path immediately."
      warningBannerVisibleIf:
        - variable: openedAttachment
          equals: true
      attachments:
        - password-reset.html
    body:
      - "The message claims your access will expire unless you act immediately."
      - "Which action should happen before you click or reply?"
    options:
      - id: inspect
        label: Inspect the sender, links, and request
        next: red-flags
        score: 0
        stateUpdates:
          - variable: investigationStatus
            set: reviewing
      - id: report-now
        label: Report the message through the approved channel
        next: follow-up
        score: 0
        stateUpdates:
          - variable: reportedPhishing
            set: true
          - variable: investigationStatus
            set: reported
      - id: click
        label: Open the attachment immediately
        next: follow-up
        score: 0
        stateUpdates:
          - variable: openedAttachment
            set: true
          - variable: investigationStatus
            set: compromised
          - variable: riskScore
            increment: 2
    interactions:
      - id: inspect-sender
        type: email_link
        optionId: inspect
        label: Inspect sender details
        hrefLabel: it-support@northwind-verify.example
        feedback: "Correct: inspect unexpected sender details before you act."
      - id: report-phishing
        type: email_action_button
        optionId: report-now
        label: Report phishing
        variant: primary
        feedback: "Reporting is the safest action once the email looks suspicious."
      - id: open-password-reset
        type: email_attachment
        optionId: click
        label: Open attachment
        fileName: password-reset.html
        feedback: "Incorrect: opening an unexpected attachment is unsafe."
  - id: red-flags
    type: question
    layout: question
    title: Spot the red flags
    body: Select every warning sign that should make you suspicious.
    prompt: Which details are phishing red flags?
    multiple: true
    correctScore: 10
    incorrectScore: 0
    passNext: password-hygiene-reminder
    failNext: follow-up
    options:
      - id: urgent
        label: The message uses urgency and pressure
        correct: true
      - id: sender
        label: The sender domain is slightly misspelled
        correct: true
      - id: logo
        label: The email includes the company logo
        correct: false
        stateUpdates:
          - variable: riskScore
            increment: 1
  - include:
      module: password_hygiene_reminder
      version: 1.0.0
  - id: report
    type: choice
    layout: quote
    title: Best next action
    body: "The safest next step is to report the message through {{reportingChannel}}."
    quote:
      text: Suspicious requests should be reported, not forwarded or answered.
      attribution: Security awareness policy
    options:
      - id: approved
        label: Report it to {{reportingChannel}}
        next: passed
        score: 0
        stateUpdates:
          - variable: reportedPhishing
            set: true
          - variable: investigationStatus
            set: reported
      - id: ask
        label: Reply and ask whether it is legitimate
        next: failed
        score: 0
        stateUpdates:
          - variable: riskScore
            increment: 1
          - variable: investigationStatus
            set: compromised
  - id: follow-up
    type: content
    layout: text
    shell: email_shell
    title: Inbox follow-up
    email:
      from: Security Operations
      subject: "Mailbox status update"
      previewText: "The next response depends on what you did in the suspicious email."
      warningBanner: "A malicious attachment was opened. This path now requires containment and device remediation."
      warningBannerVisibleIf:
        - variable: openedAttachment
          equals: true
    body:
      - "Security systems respond differently depending on whether you reported the message or interacted with it."
      - "Advance to see the result of your earlier decision."
    callout:
      title: Approved response confirmed
      text: Security has already quarantined the message because it was reported promptly.
      visibleIf:
        - variable: reportedPhishing
          equals: true
    next: report
    nextWhen:
      - when:
          - variable: openedAttachment
            equals: true
        next: failed
      - when:
          - variable: reportedPhishing
            equals: true
        next: passed
  - include: result_block
