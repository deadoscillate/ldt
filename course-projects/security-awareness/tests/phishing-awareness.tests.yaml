id: phishing-awareness
title: Phishing awareness logic tests
description: Deterministic learner-path tests for the phishing awareness course family.
target:
  templateId: phishing-awareness
  themeId: default
tests:
  - id: correct-answer-passes
    name: Correct answer path passes
    description: Inspecting the message, identifying the red flags, and reporting it should end in the safe resolution path.
    tags:
      - scored
      - pass
      - shared-module
      - stateful
    target:
      variantId: k12-district
    actions:
      - step: intro
        advance: true
      - step: inspect-email
        interact: inspect-sender
      - step: red-flags
        select:
          - urgent
          - sender
      - step: password-hygiene-reminder
        advance: true
      - step: report
        select: approved
    expect:
      terminalStep: passed
      score: 10
      completionStatus: completed
      successStatus: passed
      pathLength: 6
      variables:
        companyName: Lakeview School District
      state:
        reportedPhishing: true
        openedAttachment: false
        investigationStatus: reported
        riskScore: 0
  - id: click-path-fails
    name: Attachment click path fails
    description: Opening the attachment should carry state into the follow-up scene and end on the compromised path.
    tags:
      - fail
      - branch
      - stateful
    target:
      variantId: healthcare
    actions:
      - step: intro
        advance: true
      - step: inspect-email
        interact: open-password-reset
      - step: follow-up
        advance: true
    expect:
      terminalStep: failed
      score: 0
      completionStatus: completed
      successStatus: failed
      pathLength: 4
      variables:
        companyName: Northwind Health
      state:
        reportedPhishing: false
        openedAttachment: true
        investigationStatus: compromised
        riskScore: 2
