title: LMS Validation Proof Center
summary: Validated in SCORM Cloud for launch, completion, score, pass/fail, and resume. Broader LMS interoperability testing is in progress and is tracked platform by platform.
philosophy: Validation is treated as part of the build and release workflow. Source YAML stays as the system of record, SCORM packages remain build artifacts, and interoperability evidence is tracked separately from course source.
betaScope:
  - Structured source authoring in YAML
  - Browser preview from validated source
  - SCORM 1.2 export
  - SCORM Cloud validation baseline
  - Broader LMS validation in progress
caveats:
  - Current proof is limited to the shipped branching scenarios and export paths tested so far.
  - LMS-specific activity settings, grading rules, or completion settings can still affect outcomes outside the package.
  - Diagnostics-enabled validation builds are recommended when testing in a new LMS environment.
  - Do not claim universal LMS compatibility until the target platform has a dated record in this registry.
checklist:
  - Import package successfully
  - Launch package successfully
  - Completion status updates
  - Score reporting works
  - Pass/fail works if configured
  - Resume works after relaunch
  - Record observed quirks or notes
